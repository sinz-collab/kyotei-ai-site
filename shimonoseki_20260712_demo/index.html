<script>
const D=JSON.parse(document.getElementById('data').textContent);
let raceNo=1, mode='ai';
const $=id=>document.getElementById(id);
function race(){return D.races.find(r=>r.race===raceNo)}
function pred(){return D.preds[String(raceNo)]}
function lane(n){const c={1:['#fff','#111','#d1d5db'],2:['#111','#fff','#111'],3:['#dc2626','#fff','#dc2626'],4:['#1d7eea','#fff','#1d7eea'],5:['#ffe74a','#111','#ffe74a'],6:['#10a38a','#fff','#10a38a']}[Number(n)];return `<span class="lane" style="background:${c[0]};color:${c[1]};border-color:${c[2]}">${n}</span>`}
function gradeClass(c){return String(c||'').startsWith('A')?'grade a':'grade'}

function tideSvg(events){if(!events.length)return '<div class="note">潮見表データが未取得です。</div>'; const pts=[{time:'00:00',level:events[0].level,type:''},...events,{time:'24:00',level:events[events.length-1].level,type:''}]; const th=t=>{const [h,m]=t.split(':').map(Number);return h+m/60}; pts.sort((a,b)=>th(a.time)-th(b.time)); const w=720,h=330,pl=56,pr=22,pt=28,pb=52,lo=Math.min(...pts.map(p=>p.level))-20,hi=Math.max(...pts.map(p=>p.level))+20; const x=p=>pl+th(p.time)/24*(w-pl-pr); const y=p=>pt+(hi-p.level)/(hi-lo)*(h-pt-pb); let d=`M${x(pts[0]).toFixed(1)},${y(pts[0]).toFixed(1)}`; for(let i=1;i<pts.length;i++){const a=pts[i-1],b=pts[i],dx=(x(b)-x(a))*0.5; d+=` C${(x(a)+dx).toFixed(1)},${y(a).toFixed(1)} ${(x(b)-dx).toFixed(1)},${y(b).toFixed(1)} ${x(b).toFixed(1)},${y(b).toFixed(1)}`} const marks=events.map(p=>`<circle cx="${x(p).toFixed(1)}" cy="${y(p).toFixed(1)}" r="7" fill="${p.type==='干潮'?'#228be6':'#f76707'}"/><text x="${x(p).toFixed(1)}" y="${(y(p)-13).toFixed(1)}" text-anchor="middle" font-size="15" fill="#334155">${p.type}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+27).toFixed(1)}" text-anchor="middle" font-size="14" fill="#334155">${p.time}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+45).toFixed(1)}" text-anchor="middle" font-size="13" fill="#64748b">${p.level}cm</text>`).join(''); return `<svg class="tide-svg" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" rx="20" fill="#f8fbff"/><line x1="${pl}" y1="${h-pb}" x2="${w-pr}" y2="${h-pb}" stroke="#cbd5e1"/><path d="${d} L${w-pr},${h-pb} L${pl},${h-pb} Z" fill="rgba(34,139,230,.10)"/><path d="${d}" fill="none" stroke="#1c7ed6" stroke-width="5" stroke-linecap="round"/>${marks}</svg>`}

function renderTide(){const p=pred(),z=p.tideZone||{},events=D.tide.events||[];tide.innerHTML=`<div class="card"><h2>下関 潮見表</h2><div class="tide-type">${D.tide.tideType||'-'}</div><div class="note">${D.tide.date||''} / ${D.tide.source||''}<br>${D.tide.summary||''}</div><div class="attack">このレースの潮判定：${z.nearest||'-'} / ${z.phase||'-'} / ${z.bucket||'-'} / ${z.band||'-'}</div>${tideSvg(events)}<table><tr><th>種別</th><th>時刻</th><th>潮位</th></tr>${events.map(x=>`<tr><td>${x.type}</td><td>${x.time}</td><td>${x.level}cm</td></tr>`).join('')}</table></div>`}

function renderPred(){const p=pred(),r=p.readability||{},s=p.predictionStage||{};prediction.innerHTML=`<div class="card index"><div class="stage ${s.color||'yellow'}"><div><b>${s.label}</b><br>${s.statusText}</div><span>${s.badge}</span></div><h2>下関ロジック予想</h2><div class="probgrid"><div class="probcard"><span>SAB</span><b>${p.sab}</b></div><div class="probcard"><span>荒れ指数</span><b>${p.upsetIndex}%</b></div><div class="probcard"><span>攻め役</span><b>${p.attack.attackLane}号艇</b></div></div><div class="probgrid" style="margin-top:8px"><div class="probcard"><span>軸明確度</span><b>${r.axisClarity??'-'}%</b></div><div class="probcard"><span>ロジックはまり</span><b>${r.logicFit??'-'}%</b></div><div class="probcard"><span>混戦度</span><b>${r.chaos??'-'}%</b></div></div><div class="note">軸候補：${r.axisLane?r.axisLane+'号艇':'-'} / ${r.comment||''}<br>潮：${p.tideZone.nearest} / ${p.tideZone.phase}</div></div><div class="card"><h2>全艇確率</h2><table><tr><th>枠</th><th>1着</th><th>2着</th><th>3着</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${p.win[n]}%</td><td>${p.second[n]}%</td><td>${p.third[n]}%</td></tr>`).join('')}</table></div><div class="card"><h2>買い目</h2><div class="mode"><button class="${mode==='ai'?'active':''}" onclick="mode='ai';renderPred()">AI予想</button><button class="${mode==='aiUpset'?'active':''}" onclick="mode='aiUpset';renderPred()">AI荒れ予想</button></div><div class="note">${modeDesc()}</div>${(p[mode]||[]).map(t=>`<div class="ticket"><div><div class="combo">${t.combo}</div><span class="role">${t.role||''}</span></div><div><span class="note">確率</span><br><b>${Number(t.prob).toFixed(2)}%</b></div></div>`).join('')}</div>`}
function renderLogs(){const p=pred();logs.innerHTML=`<div class="card"><h2>${raceNo}R 補正ログ</h2>${p.logs.map(l=>`<div class="log"><div class="log-title">${l.lane}号艇 ${l.name} / 進入${l.actualCourse}コース</div><div class="log-body">${(l.notes||[]).join('<br>')}</div></div>`).join('')}</div>`}
function renderAll(){renderTabs();renderEntry();renderTide();renderPred();renderLogs()}
document.querySelectorAll('.nav button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));$(btn.dataset.pane).classList.add('active')})
