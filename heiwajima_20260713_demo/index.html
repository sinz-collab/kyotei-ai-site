function renderRealtime(){let s=stage(),last=race().last||[],ex=race().ex||[];document.getElementById("lastTable").innerHTML=last.length?`<tr><th>艇</th><th>進入</th><th>選手</th><th>体重</th><th>展示</th><th>ST</th><th>部品</th></tr>`+last.map(r=>`<tr><td>${laneBadge(r.lane)}</td><td>${r.entry||r.lane}</td><td>${nameOf(r.lane)}</td><td>${r.weight}kg</td><td><b>${r.time}</b></td><td><b>${r.st||"-"}</b></td><td>${r.part}</td></tr>`).join(""):`<tr><td><div class="note">直前・スリット情報はまだ未取得です。</div></td></tr>`;document.getElementById("exTable").innerHTML=ex.length?`<tr><th>艇</th><th>1周</th><th>回り</th><th>直線</th><th>展示</th><th>合算</th></tr>`+ex.map(r=>`<tr><td>${r.lane} ${nameOf(r.lane)}</td><td>${r.lap}</td><td>${r.turn}</td><td>${r.line}</td><td>${r.show}</td><td>${r.sum||"-"}</td></tr>`).join(""):`<tr><td><div class="note">オリジナル展示はまだ未取得です。</div></td></tr>`;const slit=document.getElementById("slit");slit.innerHTML='<div class="start-line"></div>';if(!last.length){slit.insertAdjacentHTML("beforeend",`<div class="note" style="padding:18px">スリット情報はまだ未取得です。</div>`)}last.forEach((r,i)=>{let st=parseFloat(String(r.st).replace("F","").replace(".","0."))||0.3;let entry=Math.min(6,Math.max(1,Number(r.entry||r.lane)||r.lane));let y=28+(entry-1)*34,x=70-Math.min(st*80,24);slit.insertAdjacentHTML("beforeend",`<div class="boatmark l${r.lane}" style="left:${x}%;top:${y}px;color:${r.lane===1?'#8a8a8a':r.lane===2?'#111':r.lane===3?'#d9363e':r.lane===4?'#2477c9':r.lane===5?'#e6cf00':'#12a690'}">${r.lane}</div><div class="st" style="top:${y}px">${r.st}</div>`)});let w=race().weather||{},wd=w.wind_dir||w.windDirection||w.windDir||w.wind_direction||"-",ws=w.wind||w.windSpeed||w.wind_speed||"-",wh=w.wave||w.waveHeight||w.wave_height||"-";document.getElementById("weather").innerHTML=`<div>天候<br><b>${w.weather||"-"}</b></div><div>風向<br><b>${wd}</b></div><div>風速<br><b>${ws}m/s</b></div><div>波高<br><b>${wh}cm</b></div><div>気温<br><b>${w.air||w.weatherDegree||"-"}℃</b></div><div>水温<br><b>${w.water||w.waterTemp||w.waterDegree||"-"}℃</b></div><div style="grid-column:1/-1"><b>${s.label}</b><br><span class="note">${s.statusText||""}${s.missingText?" / "+s.missingText:""}</span></div>`;}
function renderPrediction(){let pr=race().prediction,s=stage();document.getElementById("upsetIndex").textContent=`${pr.upsetIndex}%`;document.getElementById("upsetBar").style.width=`${pr.upsetIndex}%`;let baseNote=pr.upsetIndex>=70?"荒れ警戒":pr.upsetIndex>=55?"中荒れ注意":pr.upsetIndex>=35?"やや荒れ":"堅め";document.getElementById("upsetNote").innerHTML=`${baseNote} / ${pr.tideComment||"潮補正なし"}<div class="stage-box ${s.color||''}"><b>${s.label}</b><div>${s.statusText||""}</div><div class="note">${s.missingText||""}</div></div>`;document.getElementById("probTable").innerHTML=`<tr><th>艇</th><th>1着</th><th>朝比</th><th>2着</th><th>朝比</th><th>3着</th><th>朝比</th></tr>`+pr.probs.map(p=>`<tr><td>${laneBadge(p.lane)} ${p.name}</td><td><b>${p.win}%</b><div class="probbar"><i style="width:${p.win}%"></i></div></td><td>${deltaCell(p.lane,"win")}</td><td>${p.second}%</td><td>${deltaCell(p.lane,"second")}</td><td>${p.third}%</td><td>${deltaCell(p.lane,"third")}</td></tr>`).join("");renderTickets();}
function allocate(list,budget){const unit=100;budget=Math.max(unit,Math.floor((Number(budget)||0)/unit)*unit);let amounts=Array(list.length).fill(unit);let used=unit*list.length;if(budget<used)return amounts.map((_,i)=>i<Math.floor(budget/unit)?unit:0);let rest=budget-used;let weights=list.map(t=>t.prob/Math.sqrt(Number(t.odds)||999));let sum=weights.reduce((a,b)=>a+b,0)||1;let adds=weights.map(w=>Math.floor((rest*w/sum)/unit)*unit);adds.forEach((a,i)=>amounts[i]+=a);let remain=budget-amounts.reduce((a,b)=>a+b,0);let order=weights.map((w,i)=>[w,i]).sort((a,b)=>b[0]-a[0]).map(x=>x[1]);let k=0;while(remain>=unit){amounts[order[k%order.length]]+=unit;remain-=unit;k++}return amounts}
function renderTickets(){let list=race().prediction[predictMode];let key=`${currentRace}-${predictMode}`;if(!stakeState[key])stakeState[key]=allocate(list,document.getElementById("budgetInput").value);let amounts=stakeState[key];let total=amounts.reduce((a,b)=>a+b,0);document.getElementById("budgetInput").value=total;let minRet=Infinity;amounts.forEach((a,i)=>{if(a>0)minRet=Math.min(minRet,a*(Number(list[i].odds)||0))});if(!isFinite(minRet))minRet=0;let diff=Math.round(minRet-total);document.getElementById("budgetNote").innerHTML=`配分合計 ${yen(total)} / 最低想定払戻 ${yen(minRet)} / <span class="${diff>=0?'pay':'short'}">${diff>=0?'最低ラインはプラス':'最低ラインはガミ'} ${yen(diff)}</span>`;document.getElementById("ticketTitle").textContent=(predictMode==="hit"?`的中率予想${list.length}点`:predictMode==="balance"?`バランス型${list.length}点`:`荒れ予想${list.length}点`);document.getElementById("tickets").innerHTML=list.map((t,i)=>`<div class="ticket"><div class="ticket-top"><div><b>${t.combo}</b><br><span class="tag">${predictMode}</span></div><div class="prob">${t.prob}%</div></div><div class="odds-stake"><div class="mini-box"><span>オッズ</span><b>${t.odds}</b></div><div class="mini-box"><span>掛け金</span><input class="stake-input" type="number" min="0" step="100" value="${amounts[i]}" data-i="${i}"></div><div class="mini-box"><span>払戻見込</span><b>${yen((Number(t.odds)||0)*amounts[i])}</b></div></div></div>`).join("");document.querySelectorAll(".stake-input").forEach(inp=>inp.oninput=e=>{let i=Number(e.target.dataset.i);amounts[i]=Math.max(0,Math.floor((Number(e.target.value)||0)/100)*100);renderTickets();});}
document.getElementById("budgetInput").onchange=()=>{let key=`${currentRace}-${predictMode}`;stakeState[key]=allocate(race().prediction[predictMode],document.getElementById("budgetInput").value);renderTickets();}
function renderResult(){let r=race().result||{status:"waiting",message:"結果未取得"},order=String(r.order||"").split("-").filter(Boolean),hitAi=(r.hitAi||[]).length,hitUpset=(r.hitUpset||[]).length;document.getElementById("resultBox").innerHTML=`<div class="judge"><b>${r.status==="ok"?"結果取得済み":"結果待ち"}</b><div class="note">${r.message||""}</div></div>${r.order?`<div class="index-card"><div class="index-top"><div><b>3連単 ${r.order}</b><div class="note">結果ソース: ${r.source||"-"}</div></div><div class="index-num">${r.payout3t||"-"}</div></div><div class="stats"><div class="stat"><b>${r.popularity3t||"-"}</b><span>人気</span></div><div class="stat"><b>${r.kimarite||"-"}</b><span>決まり手</span></div><div class="stat"><b>${hitAi||hitUpset?"的中":"-"}</b><span>予想照合</span></div></div></div><table><tr><th>着順</th><th>艇</th></tr>${order.map((n,i)=>`<tr><td>${i+1}着</td><td>${laneBadge(n)} ${nameOf(n)}</td></tr>`).join("")}</table><div class="note">AI予想該当: ${hitAi?(r.hitAi||[]).map(x=>x.combo).join(" / "):"なし"}<br>AI荒れ該当: ${hitUpset?(r.hitUpset||[]).map(x=>x.combo).join(" / "):"なし"}</div>`:`<div class="judge"><b>結果待ち</b><div class="note">締切後に結果取得が成功するとここに着順・払戻・的中判定を表示します。</div></div>`}`;}
function renderOdds(){let odds=race().odds, by={};Object.entries(odds).forEach(([combo,val])=>{let [a,b,c]=combo.split("-").map(Number);by[a]??={};by[a][b]??=[];by[a][b].push({third:c,val})});document.getElementById("allOddsBoard").innerHTML=Object.keys(by).map(first=>`<div class="odds-card"><div class="odds-head">${laneBadge(first)} ${first}着 ${nameOf(first)}</div>${Object.keys(by[first]).map(second=>`<div class="second-row"><div class="second-label">2着<br>${laneBadge(second)}</div><div class="third-grid">${by[first][second].map(x=>`<div class="third-cell ${x.val<=15?'best':x.val<=40?'mid':''}"><span class="third">3着 ${laneBadge(x.third)}</span><span class="odval">${x.val}</span></div>`).join("")}</div></div>`).join("")}</div>`).join("");}
renderAll();
</script></body></html>
