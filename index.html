<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SINZ EDGE</title>
  <script>
    (function () {
      var build = "20260723-2";
      var url = new URL(location.href);
      if (url.searchParams.get("v") !== build) {
        url.searchParams.set("v", build);
        location.replace(url.toString());
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=20260723-2">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo-wrap"><img class="brand-logo" src="assets/sinz-edge-logo.jpg" alt="SINZ EDGE"></div>
        <span class="pill" id="syncState">DATA</span>
      </div>
      <nav class="tabs">
        <button class="active" data-view="top">トップ</button>
        <button data-view="race">レース</button>
      </nav>
    </header>

    <section class="content">
      <section id="topView">
        <div class="date-card">
          <b id="dateTitle">読み込み中...</b>
          <span>場を選択するとJSONから予想データを表示します</span>
        </div>
        <div class="venue-grid" id="venueGrid"></div>
      </section>

      <section id="raceView" hidden>
        <button class="back" id="backTop">← トップへ</button>
        <div class="race-head">
          <h1 id="venueTitle">-</h1>
          <p id="venueMeta">-</p>
        </div>
        <div class="race-tabs" id="raceTabs"></div>
        <nav class="subnav">
          <button class="active" data-pane="entry">出走表</button>
          <button data-pane="compare">選手比較</button>
          <button data-pane="realtime">直前・展示</button>
          <button data-pane="tide">潮見表</button>
          <button data-pane="odds">オッズ</button>
          <button data-pane="prediction">予想</button>
          <button data-pane="logs">補正ログ</button>
          <button data-pane="result">結果</button>
        </nav>
        <section id="pane"></section>
      </section>
    </section>
  </main>

  <script src="config.js?v=7a01e2fb935a"></script>
  <script src="app.js?v=20260723-2"></script>
</body>
</html>
