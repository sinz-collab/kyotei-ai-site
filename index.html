<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競艇AI予想 - トップ</title>
  <style>
    :root {
      --bg:#f2f5f8;--card:#fff;--line:#d8dee6;--ink:#151922;--muted:#7b8794;
      --off:#e7ebf0;--blue:#5d86ac;--g2:#38a471;--g3:#3b8ed4;--accent:#1d7eea;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink)}
    .app{width:min(560px,100%);min-height:100svh;margin:0 auto;background:#f7f9fb}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .brand{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px 9px}
    .brand-title{display:flex;align-items:center;gap:9px;font-weight:950;letter-spacing:-.02em}
    .home{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:#eef3f8;font-size:18px}
    .pill{padding:7px 11px;border-radius:999px;background:#eef3f8;color:#485465;font-weight:850;font-size:12px}
    .tabs{display:flex;padding:0 8px}.tab{padding:12px 10px 11px;color:#1d2430;font-size:14px;font-weight:900;text-decoration:none;border-bottom:3px solid transparent}.tab.active{color:#000;border-bottom-color:var(--accent)}
    .content{padding:14px 11px 28px}
    .date-row{margin:3px 0 14px;padding:13px 12px;border-radius:16px;background:#fff;box-shadow:0 2px 10px rgba(15,39,66,.06)}
    .date-title{text-align:center;font-size:17px;font-weight:950;letter-spacing:-.02em}.date-title small{display:block;margin-top:2px;color:var(--muted);font-size:11px;font-weight:800}
    .venue-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);background:var(--line);gap:1px}
    .venue{min-height:108px;position:relative;display:block;padding:8px 7px 7px;background:var(--card);color:inherit;text-decoration:none;overflow:hidden}
    .venue.off{background:var(--off);color:#aeb6c0;pointer-events:none}
    .venue.ready{box-shadow:inset 0 0 0 2px rgba(29,126,234,.08)}
    .grade{position:absolute;top:0;left:0;min-width:38px;padding:7px 5px;background:var(--blue);color:#fff;font-size:13px;font-weight:950;text-align:center}.grade.g2{background:var(--g2)}.grade.g3{background:var(--g3)}
    .name{margin:0 0 8px;padding-left:38px;font-size:18px;line-height:1.15;font-weight:950;letter-spacing:-.04em;min-height:24px}.off .name{padding-left:0;text-align:center;font-size:17px;margin-top:2px}
    .meta{text-align:center;line-height:1.42;font-size:13px;font-weight:750}.meta strong{display:block;margin-top:2px;font-size:15px;font-weight:950}
    .status{display:inline-flex;align-items:center;margin-top:5px;padding:3px 6px;border-radius:999px;background:rgba(29,126,234,.1);color:#1765bd;font-size:10px;font-weight:950}
    .section-card{margin-top:16px;border-radius:14px;background:#fff;border:1px solid #e1e7ee;overflow:hidden;box-shadow:0 4px 14px rgba(15,39,66,.05)}
    .section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;font-weight:950}
    .legend{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}.legend div{padding:10px 8px;border-right:1px solid var(--line);font-size:12px;color:#667085;line-height:1.5}.legend div:last-child{border-right:0}.legend b{display:block;color:#17202a;font-size:13px;margin-bottom:2px}
    @media (max-width:380px){.venue{min-height:104px;padding:7px 5px}.name{font-size:16px;padding-left:34px}.grade{min-width:34px;font-size:12px}.meta{font-size:12px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title"><span class="home">⌂</span>競艇AI予想</div>
        <div class="pill">AUTO</div>
      </div>
      <nav class="tabs" aria-label="メニュー"><a class="tab active" href="index.html">トップ</a></nav>
    </header>
    <section class="content">
      <div class="date-row"><div class="date-title">本日7月9日(木)のレース<small>開催場をタップして詳細へ</small></div></div>
      <section class="venue-grid" aria-label="開催場一覧">
        <a class="venue off"><h2 class="name">芦屋</h2><div class="meta">非開催</div></a>
<a class="venue off"><h2 class="name">下関</h2><div class="meta">非開催</div></a>

      <a class="venue ready" href="toda_20260709_demo/index.html">
        <span class="grade g2">G2</span>
        <h2 class="name">戸田</h2>
        <div class="meta">レース情報<strong>1R 10:31</strong><span class="status">詳細ページあり</span></div>
      </a>
    
<a class="venue off"><h2 class="name">江戸川</h2><div class="meta">非開催</div></a>

      <a class="venue ready" href="wakamatsu_20260709_demo/index.html">
        <span class="grade g3">G3</span>
        <h2 class="name">若松</h2>
        <div class="meta">レース情報<strong>1R 15:29</strong><span class="status">取得済み</span></div>
      </a>
    

      <div class="venue ready">
        <span class="grade ">一般</span>
        <h2 class="name">常滑</h2>
        <div class="meta">レース情報<strong>1R 10:42</strong><span class="status">取得済み</span></div>
      </div>
    

      <div class="venue ready">
        <span class="grade ">一般</span>
        <h2 class="name">大村</h2>
        <div class="meta">レース情報<strong>1R 17:41</strong><span class="status">取得済み</span></div>
      </div>
    
<a class="venue off"><h2 class="name">唐津</h2><div class="meta">非開催</div></a>
<a class="venue off"><h2 class="name">福岡</h2><div class="meta">非開催</div></a>
<a class="venue off"><h2 class="name">平和島</h2><div class="meta">非開催</div></a>
      </section>
      <section class="section-card">
        <div class="section-head"><span>レースアイコンの説明</span><span>⌄</span></div>
        <div class="legend">
          <div><b>白背景</b>開催中または取得済みの場です。</div>
          <div><b>グレー</b>本日は非開催、または出走表が未取得の場です。</div>
          <div><b>詳細ページあり</b>作成済みの予想ページへ移動できます。</div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
