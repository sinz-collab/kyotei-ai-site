<style>
:root{

}
*{box-sizing:border-box}
body{margin:0;background:#e8edf5;color:var(--ink)}
.app{max-width:520px;margin:auto;min-height:100svh;background:#f7f9fb}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);padding:10px 12px;backdrop-filter:blur(10px)}
.toplink{display:inline-flex;color:#1765bd;text-decoration:none;font-weight:900;font-size:13px;margin-bottom:5px}
.title{font-size:20px;font-weight:950;letter-spacing:-.03em}
.meta{color:var(--muted);font-size:12px;font-weight:800;margin-top:3px;line-height:1.45}
.race-tabs,.nav{display:flex;gap:7px;overflow-x:auto;padding:10px 12px;background:#f7f9fb;scrollbar-width:none}
.race-tabs::-webkit-scrollbar,.nav::-webkit-scrollbar{display:none}
button{font-family:inherit}
.race-tabs button,.nav button,.mode button{border:0;border-radius:999px;background:#fff;color:#526071;padding:9px 12px;font-weight:950;white-space:nowrap;box-shadow:0 2px 8px rgba(15,39,66,.04)}
button.active{background:var(--navy)!important;color:#fff!important}
.content{padding:0 12px 28px}
.pane{display:none}.pane.active{display:block}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;margin:12px 0;padding:14px;box-shadow:0 8px 22px rgba(15,23,42,.05)}
.index{background:linear-gradient(135deg,#fff4e6,#fff9db);border-color:#ffe8a3}
h2{font-size:18px;margin:0 0 10px}h3{font-size:15px;margin:14px 0 8px}
.lane{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:10px;border:1px solid;font-weight:950}
.boat{display:grid;grid-template-columns:34px 1fr;gap:10px;margin:10px 0}
.name{font-weight:950;color:#1269aa}.grade{display:inline-block;margin-left:5px;background:#755726;color:#fff;border-radius:5px;padding:1px 5px;font-size:12px}.grade.a{background:#dc2626}.f-badge{display:inline-block;margin-left:5px;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:999px;padding:1px 7px;font-size:11px;font-weight:950}
.sub,.note{font-size:12px;color:var(--muted);line-height:1.55}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.stat{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:7px;text-align:center}
.stat.rank1{background:#fff0ea;border-color:#ffc9b8}.stat.rank2{background:#fff8c7;border-color:#f7e58a}
.stat b{display:block}.stat span{font-size:10px;color:var(--muted)}
.season{margin-top:8px;padding:8px 10px;border-radius:12px;background:#fffaf0;border:1px solid #fdecc8;font-size:12px;color:#92400e;font-weight:900}.season-strip{display:flex;gap:7px;overflow-x:auto;margin-top:6px;padding-bottom:3px;scrollbar-width:none}.season-strip::-webkit-scrollbar{display:none}.season-day{min-width:118px;background:#fffdf6;border:1px solid #fdecc8;border-radius:12px;padding:6px;text-align:center}.season-day-title{font-size:11px;font-weight:950;color:#92400e;margin-bottom:4px}.season-runs{display:grid;grid-template-columns:repeat(2,minmax(48px,1fr));gap:4px}.season-run{background:#fff7df;border-radius:9px;padding:4px 3px;text-align:center}.season-run .r{font-size:10px;font-weight:950;color:#92400e}.season-run .st{font-size:9px;color:#64748b;margin-top:1px}.season-run .fin{font-size:12px;font-weight:950;color:#17202a;margin-top:1px}
.coursebox{margin-top:8px;padding:9px 10px;border-radius:12px;background:#f8fafc;border:1px solid var(--line);font-size:12px;line-height:1.5}
.coursebox b{font-size:14px}.coursebox .good{color:#0f766e}.coursebox .bad{color:#dc2626}.coursebox .normal{color:#475569}

.time-badge.rank1{background:#ffd9cc;color:#7c2d12}.time-badge.rank2{background:#fff1a8;color:#713f12}
.tide-type{display:inline-flex;align-items:center;justify-content:center;margin:4px 0 8px;padding:8px 16px;border-radius:999px;background:#e7f5ff;color:#1765bd;font-size:22px;font-weight:950;letter-spacing:.03em}
.tide-svg{width:100%;height:auto;margin-top:8px;border-radius:14px;background:#f8fbff}
.slit{position:relative;height:236px;margin-top:10px;border-radius:18px;background:linear-gradient(135deg,#e9f7ff,#f8fbff);border:1px solid #dbe7f3;overflow:hidden}
.slit::before{content:"";position:absolute;top:18px;bottom:18px;left:66%;width:5px;background:#ef4444;border-radius:999px;box-shadow:0 0 0 3px rgba(239,68,68,.10)}
.slit::after{content:"スタートライン";position:absolute;top:7px;left:calc(66% - 35px);font-size:10px;color:#ef4444;font-weight:900}
.slit-row{position:absolute;left:0;right:0;height:34px;display:flex;align-items:center;border-bottom:1px dashed rgba(100,116,139,.18)}
.slit-lane{position:absolute;left:8px;width:30px;text-align:center;font-weight:950}
.boatmark{position:absolute;width:34px;height:18px;border-radius:14px 5px 5px 14px;color:#fff;display:grid;place-items:center;font-weight:950;font-size:11px;box-shadow:0 2px 5px rgba(15,23,42,.22)}
.boatmark::after{content:"";position:absolute;right:-6px;top:5px;border-left:7px solid currentColor;border-top:4px solid transparent;border-bottom:4px solid transparent;filter:brightness(.8)}
.slit-st{position:absolute;right:10px;width:46px;text-align:right;font-weight:950;font-size:13px}.slit-st.f{color:#dc2626}

.stage{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;padding:10px 11px;border-radius:14px;font-size:12px;font-weight:900;line-height:1.45}
.stage span{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:950;white-space:nowrap}
.stage.yellow{background:#fff7e6;color:#8a5a00}.stage.yellow span{background:#f59e0b;color:#fff}
.stage.green{background:#ecfdf3;color:#047857}.stage.green span{background:#16a34a;color:#fff}
.stage.blue{background:#eef6ff;color:#1765bd}.stage.blue span{background:#1d7eea;color:#fff}
.attack{display:flex;align-items:center;gap:8px;padding:10px;border-radius:14px;background:#f8fafc;border:1px solid var(--line);font-weight:900;line-height:1.45}
.mode{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:10px 0}
.ticket{display:grid;grid-template-columns:1fr 58px 62px;gap:8px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:9px;margin:7px 0}
.combo{font-weight:950;font-size:17px}.role{display:inline-flex;margin-top:4px;padding:2px 7px;border-radius:999px;background:#e7f5ff;color:#1765bd;font-size:11px;font-weight:900}
.oddsboard{display:grid;gap:8px}.odrow{display:grid;grid-template-columns:70px 1fr 60px;gap:6px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;align-items:center}
.result-split{display:grid;gap:10px}.mini-odds{max-height:520px;overflow:auto;padding-right:2px}

<script>

function tideSvg(events){if(!events.length)return ''; const pts=[{time:'00:00',level:events[0].level,type:''},...events,{time:'24:00',level:events[events.length-1].level,type:''}]; const th=t=>{const [h,m]=t.split(':').map(Number);return h+m/60}; pts.sort((a,b)=>th(a.time)-th(b.time)); const w=720,h=330,pl=56,pr=22,pt=28,pb=52,lo=Math.min(...pts.map(p=>p.level))-20,hi=Math.max(...pts.map(p=>p.level))+20; const x=p=>pl+th(p.time)/24*(w-pl-pr); const y=p=>pt+(hi-p.level)/(hi-lo)*(h-pt-pb); let d=`M${x(pts[0]).toFixed(1)},${y(pts[0]).toFixed(1)}`; for(let i=1;i<pts.length;i++){const a=pts[i-1],b=pts[i],dx=(x(b)-x(a))*0.5; d+=` C${(x(a)+dx).toFixed(1)},${y(a).toFixed(1)} ${(x(b)-dx).toFixed(1)},${y(b).toFixed(1)} ${x(b).toFixed(1)},${y(b).toFixed(1)}`} const marks=events.map(p=>`<circle cx="${x(p).toFixed(1)}" cy="${y(p).toFixed(1)}" r="7" fill="${p.type==='干潮'?'#228be6':'#f76707'}"/><text x="${x(p).toFixed(1)}" y="${(y(p)-13).toFixed(1)}" text-anchor="middle" font-size="15" fill="#334155">${p.type}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+27).toFixed(1)}" text-anchor="middle" font-size="14" fill="#334155">${p.time}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+45).toFixed(1)}" text-anchor="middle" font-size="13" fill="#64748b">${p.level}cm</text>`).join(''); return `<svg class="tide-svg" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" rx="20" fill="#f8fbff"/><line x1="${pl}" y1="${h-pb}" x2="${w-pr}" y2="${h-pb}" stroke="#cbd5e1"/><path d="${d} L${w-pr},${h-pb} L${pl},${h-pb} Z" fill="rgba(34,139,230,.10)"/><path d="${d}" fill="none" stroke="#1c7ed6" stroke-width="5" stroke-linecap="round"/>${marks}</svg>`}
function slitChart(last){const line=66; const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)); const pos=n=>{const raw=last[n]?.st_raw||''; const v=Number(last[n]?.st); if(!Number.isFinite(v))return 45; if(raw.startsWith('F'))return clamp(line+Math.abs(v)*150, line+4, 82); return clamp(line-v*185, 28, line-2)}; const order=[1,2,3,4,5,6].sort((a,b)=>num(last[a]?.start_course,a)-num(last[b]?.start_course,b)); const changed=order.some((n,i)=>n!==i+1); return `<h3>スリット体型 ${changed?'<span class="note">進入変更あり</span>':''}</h3><div class="slit">${order.map((n,i)=>`<div class="slit-row" style="top:${22+i*34}px"><div class="slit-lane">${lane(n)}<small>${last[n]?.start_course?last[n].start_course+'コース':''}</small></div><div class="boatmark" style="left:calc(${pos(n)}% - 17px);background:${boatColor(n)};color:${n==5?'#111':'#fff'}">${n}</div><div class="slit-st ${(last[n]?.st_raw||'').startsWith('F')?'f':''}">${last[n]?.st_raw??'-'}</div></div>`).join('')}</div>`}
function renderTabs(){raceTabs.innerHTML=D.races.map(r=>`<button class="${r.race===raceNo?'active':''}" onclick="raceNo=${r.race};renderAll();window.scrollTo({top:0,behavior:'smooth'})">${r.race}R</button>`).join('')}
function modeDesc(){return mode==='ai'?'本線5点・抑え3点・穴2点。的中率と回収率のバランスを見たAI予想。':'攻め役1着・スリット攻め・展開連動・高配当を重視したAI荒れ予想。'}
function entryChangeNote(p){const changes=p.entryChanges||race().entry_changes||[];return changes.length?`<div class="attack" style="border-color:#f59f00;background:#fff7ed">進入変更反映：${changes.map(x=>`${x.lane}号艇→${x.course}コース`).join(' / ')}<br><span class="note">スリット情報の実進入でコース適性・攻め役・1号艇評価を再計算済み</span></div>`:''}
function gradeClass(c){return String(c||'').startsWith('A')?'grade a':'grade'}
function fBadge(b){const f=String(b.f||''); return /^F[1-9]/.test(f)?`<span class="f-badge">${f}</span>`:''}
function seasonRunCard(run){return `<div class="season-run"><div class="r">${run.race||'-'} / ${run.frame||'-'}枠</div><div class="st">ST ${run.st||'-'}</div><div class="fin">${run.finish||'-'}</div></div>`}
function seasonTableFromGroups(groups,text){if(Array.isArray(groups)&&groups.length){return `<div class="season-strip">${groups.map(g=>`<div class="season-day"><div class="season-day-title">${g.day}</div><div class="season-runs">${(g.runs||[]).map(seasonRunCard).join('')}</div></div>`).join('')}</div>`} const rows=String(text||'').split('/').map(x=>x.trim()).filter(Boolean).map(x=>{const m=x.match(/([0-9]+R) +([1-6]) +(F?[.][0-9]{2}) +(.+)/);return m?seasonRunCard({race:m[1],frame:m[2],st:m[3],finish:m[4]}):`<div class="season-day"><div class="season-day-title">${x}</div></div>`}).join(''); return rows?`<div class="season-strip">${rows}</div>`:'<div class="note">-</div>'}
function renderEntry(){const r=race();entry.innerHTML=`<div class="card"><h2>${r.race}R 締切 ${r.deadline||'-'} <span class="note">${r.type||''}</span></h2>${r.racers.map(b=>`<div class="boat">${lane(b.lane)}<div><div class="name">${b.name}${b.female?' 💗':''}<span class="${gradeClass(b.class)}">${b.class}</span>${fBadge(b)}</div><div class="sub">${b.age}歳 / ${b.weight}kg　${b.branch}支部 / ${b.home}出身</div><div class="stats"><div class="stat"><span>全国</span><b>${b.nat_win}</b></div><div class="stat"><span>当地</span><b>${b.local_win}</b></div><div class="stat"><span>全国平均ST</span><b>${b.avg_st}</b></div></div><div class="stats"><div class="stat"><span>当地平均ST</span><b>${b.local_avg_st||'-'}</b><em>${b.local_avg_st_source||''}</em></div><div class="stat"><span>当地ST順位</span><b>${b.local_st_order||'-'}</b></div><div class="stat"><span>自前DB件数</span><b>${b.local_st_count||'-'}</b><em>信頼 ${b.local_st_rank||'-'}</em></div></div><div class="note">当地平均ST・順位は取得済みの当地データを優先。件数と信頼度は自前DBの同コース実績です。</div>${courseSummary(b)}<div class="stats"><div class="stat"><span>モーター</span><b>${b.motor_no}</b></div>${statBox('2連率',b.motor_2,raceRankClass('motor_2',b.lane))}${statBox('3連率',b.motor_3,raceRankClass('motor_3',b.lane))}</div><div class="season">節間成績 ${b.hayami?`<span class="note"> / 早見 ${b.hayami}</span>`:''}${seasonTableFromGroups(b.season_groups,b.season_results)}</div></div></div>`).join('')}</div>`}
function renderTide(){const p=pred(),z=p.tideZone||{},events=D.tide.events||[];tide.innerHTML=`<div class="card"><h2>東京湾 潮見表</h2><div class="tide-type">${D.tide.tideType||'-'}</div><div class="note">${D.tide.date||''} / ${D.tide.source||''}<br>${D.note||''}</div><div class="attack">このレースの潮判定：${z.nearest||'-'} / ${z.zone||'-'} / ${z.band||'-'} / ${z.phase||'-'}</div>${tideSvg(events)}<table><tr><th>種別</th><th>時刻</th><th>潮位</th></tr>${events.map(x=>`<tr><td>${x.type}</td><td>${x.time}</td><td>${x.level}cm</td></tr>`).join('')}</table></div>`}
function renderRealtime(){const p=pred(),rt=p.realtime||{},last=rt.last||{},ex=rt.original||{},w=rt.weather||{};realtime.innerHTML=`<div class="card"><h2>直前情報</h2><div class="note">天候 ${w.weather||'-'} / 風速 ${w.wind||'-'}m / 波 ${w.wave||'-'}cm / 水温 ${w.water||'-'}℃</div><table><tr><th>枠</th><th>展示</th><th>ST</th><th>チルト</th><th>部品</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${rankValue(last,n,'time',last[n]?.time,true)}</td><td>${last[n]?.st_raw??last[n]?.st??'-'}</td><td>${last[n]?.tilt??'-'}</td><td>${last[n]?.part??'-'}</td></tr>`).join('')}</table>${slitChart(last)}<h3>オリジナル展示</h3><table><tr><th>枠</th><th>1周</th><th>回り足</th><th>直線</th><th>展示</th><th>合算</th><th>平均との差</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${rankValue(ex,n,'lap',ex[n]?.lap,true)}</td><td>${rankValue(ex,n,'turn',ex[n]?.turn,true)}</td><td>${rankValue(ex,n,'line',ex[n]?.line,true)}</td><td>${rankValue(ex,n,'show',ex[n]?.show,true)}</td><td>${rankValue(ex,n,'sum',ex[n]?.sum,true)}</td><td>${ex[n]?.sum_diff??'-'}</td></tr>`).join('')}</table></div>`}
function renderPred(){const p=pred(); if(!p.win){prediction.innerHTML='<div class="card"><h2>予想</h2><div class="note">このレースの予想データはまだありません。</div></div>';return} const r=p.readability||{},s=p.predictionStage||{label:'AI仮予想',statusText:'直前情報未反映',badge:'仮予想',color:'yellow'};prediction.innerHTML=`<div class="card index"><div class="stage ${s.color||'yellow'}"><div><b>${s.label}</b><br>${s.statusText}</div><span>${s.badge}</span></div>${entryChangeNote(p)}<h2>戸田ロジック予想</h2><div class="probgrid"><div class="probcard"><span>SAB</span><b>${p.sab}</b></div><div class="probcard"><span>荒れ指数</span><b>${p.upsetIndex}%</b></div><div class="probcard"><span>攻め役</span><b>${p.attack?.attackLane??'-'}号艇</b></div></div><div class="note">荒れ指数は「1が飛ぶか」だけではなく、軸・展開・ロジックのはまり具合から算出。</div><div class="probgrid" style="margin-top:8px"><div class="probcard"><span>軸明確度</span><b>${r.axisClarity??'-'}%</b></div><div class="probcard"><span>ロジックはまり</span><b>${r.logicFit??'-'}%</b></div><div class="probcard"><span>混戦度</span><b>${r.chaos??'-'}%</b></div></div><div class="note">軸候補：${r.axisLane?r.axisLane+'号艇':'-'} / ${r.comment||''}<br>潮：${p.tideZone?.nearest||'-'} / ${p.tideZone?.zone||'-'}</div></div><div class="card"><h2>全艇確率</h2><table><tr><th>枠</th><th>1着</th><th>2着</th><th>3着</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${num(p.win[n]).toFixed(1)}%</td><td>${num(p.second[n]).toFixed(1)}%</td><td>${num(p.third[n]).toFixed(1)}%</td></tr>`).join('')}</table></div><div class="card"><h2>買い目</h2><div class="mode"><button class="${mode==='ai'?'active':''}" onclick="mode='ai';renderPred()">AI予想</button><button class="${mode==='aiUpset'?'active':''}" onclick="mode='aiUpset';renderPred()">AI荒れ予想</button></div><div class="note">${modeDesc()}</div>${(p[mode]||[]).map(t=>`<div class="ticket"><div><div class="combo">${t.combo}</div><span class="role">${t.role||''}</span></div><div><span class="note">確率</span><br><b>${num(t.prob).toFixed(2)}%</b></div><div><span class="note">オッズ</span><br><b>${t.odds??'-'}倍</b></div></div>`).join('')}</div>`}
function renderLogs(){const p=pred(),list=p.logs||[];logs.innerHTML=`<div class="card"><h2>補正ログ</h2><div class="note">戸田指示書とマスタDBをどこで反映したかを表示します。</div>${list.map(l=>`<div class="log"><div class="log-title">${l.stage} ${l.lane?lane(l.lane):''} <span class="note">1着${l.win} / 2着${l.second} / 3着${l.third}</span></div><div class="log-body">${l.reason}<br>${l.source?`参照: ${l.source}`:''}</div></div>`).join('')}</div>`}
function renderResult(){const p=pred(),r=p.result||{status:'waiting',message:'結果未取得'},oddsItems=Object.entries(p.odds||{}).slice(0,40); const hitAi=(r.hitAi||[]).length,hitUpset=(r.hitUpset||[]).length; result.innerHTML=`<div class="result-split"><div class="card"><h2>レース結果</h2><div class="stage ${r.status==='ok'?'green':'yellow'}"><div><b>${r.status==='ok'?'結果取得済み':'結果待ち'}</b><br>${r.message||''}</div><span>${r.status==='ok'?'確定':'待機'}</span></div><div class="probgrid"><div class="probcard"><span>3連単</span><b>${r.order||'-'}</b></div><div class="probcard"><span>払戻</span><b>${r.payout3t||'-'}</b></div><div class="probcard"><span>人気</span><b>${r.popularity3t||'-'}</b></div></div><div class="probgrid" style="margin-top:8px"><div class="probcard"><span>決まり手</span><b>${r.kimarite||'-'}</b></div><div class="probcard"><span>AI予想</span><b>${hitAi?'的中':'-'}</b></div><div class="probcard"><span>AI荒れ</span><b>${hitUpset?'的中':'-'}</b></div></div>${r.order?`<div class="note" style="margin-top:10px">結果ソース：${r.source||'-'}<br>AI予想該当：${hitAi? r.hitAi.map(x=>`${x.combo} ${x.role||''}`).join(' / '):'なし'}<br>AI荒れ予想該当：${hitUpset? r.hitUpset.map(x=>`${x.combo} ${x.role||''}`).join(' / '):'なし'}</div>`:`<div class="note">結果取得がまだでも、右側に直近オッズを表示します。締切9分後から結果取得を試します。</div>`}</div><div class="card"><h2>オッズ</h2><div class="note">3連単オッズ ${oddsItems.length?`${Object.keys(p.odds||{}).length}点取得済み`:'未取得'}。全件は「オッズ」タブで確認できます。</div><div class="oddsboard mini-odds">${oddsItems.length?oddsItems.map(([k,v])=>`<div class="odrow"><b>${k}</b><span>${k.split('-').map(x=>lane(+x)).join('')}</span><strong>${v}</strong></div>`).join(''):'<div class="note">オッズ未取得です。</div>'}</div></div></div>`}
function renderOdds(){const p=pred(),items=Object.entries(p.odds||{}).slice(0,120);odds.innerHTML=`<div class="card"><h2>3連単オッズ</h2><div class="oddsboard">${items.map(([k,v])=>`<div class="odrow"><b>${k}</b><span>${k.split('-').map(x=>lane(+x)).join('')}</span><strong>${v}</strong></div>`).join('')}</div></div>`}
function renderAll(){renderTabs();renderEntry();renderTide();renderRealtime();renderPred();renderLogs();renderResult();renderOdds()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));$(b.dataset.pane).classList.add('active')});
renderAll();
</script>
</body>
</html>
