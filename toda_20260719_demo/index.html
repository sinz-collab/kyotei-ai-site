function rankClass(values,n,key,asc=true){const arr=[1,2,3,4,5,6].map(x=>[x,Number(values[x]?.[key])]).filter(x=>Number.isFinite(x[1])&&x[1]>0).sort((a,b)=>asc?a[1]-b[1]:b[1]-a[1]); const r=arr.findIndex(x=>x[0]===n)+1; return r===1?'rank1':r===2?'rank2':''}
function rankValue(values,n,key,val,asc=true){const cls=rankClass(values,n,key,asc); const v=val??'-'; return cls?`<span class="time-badge ${cls}">${v}</span>`:v}
function courseLabel(b){const starts=num(b.course_starts,-1),win=num(b.course_win_rate,-1),top3=num(b.course_top3_rate,-1),diff=num(b.course_top3_diff,-999),rel=b.course_reliability||''; if(starts<0)return 'データなし'; if(starts<5||rel==='参考')return '少数参考'; if((b.course_strength||'').includes('苦手')||diff<=-15)return '苦手'; if(win>=25&&diff>=10)return '頭まで得意'; if(win>=12&&diff>=10)return '得意'; if(top3>=60&&diff>=10)return '連絡み向き'; if(diff>=5)return 'やや得意'; return '標準'}
function courseClass(v){return ['頭まで得意','得意','連絡み向き','やや得意'].includes(v)?'good':v==='苦手'?'bad':'normal'}
function courseSummary(b){const s=courseLabel(b); const cls=courseClass(s); return `<div class="coursebox">コース適性：<b class="${cls}">${s}</b><br><span class="note">${b.lane}コース実績 ${b.course_starts||'-'}走 / 1着率 ${b.course_win_rate||'-'}% / 3連対率 ${b.course_top3_rate||'-'}% / 場平均差 ${b.course_top3_diff||'-'}pt / 信頼度 ${b.course_reliability||'-'}</span></div>`}
function rateNum(v){const n=Number(String(v??'').replace('%','').trim());return Number.isFinite(n)?n:-1}
function statBox(label,value,cls=''){return `<div class="stat ${cls}"><span>${label}</span><b>${value||'-'}</b></div>`}
function raceRankClass(field,lane){const arr=race().racers.map(b=>[b.lane,rateNum(b[field])]).filter(x=>x[1]>=0).sort((a,b)=>b[1]-a[1]); const r=arr.findIndex(x=>x[0]===lane)+1; return r===1?'rank1':r===2?'rank2':''}
function tideSvg(events){if(!events.length)return ''; const pts=[{time:'00:00',level:events[0].level,type:''},...events,{time:'24:00',level:events[events.length-1].level,type:''}]; const th=t=>{const [h,m]=t.split(':').map(Number);return h+m/60}; pts.sort((a,b)=>th(a.time)-th(b.time)); const w=720,h=330,pl=56,pr=22,pt=28,pb=52,lo=Math.min(...pts.map(p=>p.level))-20,hi=Math.max(...pts.map(p=>p.level))+20; const x=p=>pl+th(p.time)/24*(w-pl-pr); const y=p=>pt+(hi-p.level)/(hi-lo)*(h-pt-pb); let d=`M${x(pts[0]).toFixed(1)},${y(pts[0]).toFixed(1)}`; for(let i=1;i<pts.length;i++){const a=pts[i-1],b=pts[i],dx=(x(b)-x(a))*0.5; d+=` C${(x(a)+dx).toFixed(1)},${y(a).toFixed(1)} ${(x(b)-dx).toFixed(1)},${y(b).toFixed(1)} ${x(b).toFixed(1)},${y(b).toFixed(1)}`} const marks=events.map(p=>`<circle cx="${x(p).toFixed(1)}" cy="${y(p).toFixed(1)}" r="7" fill="${p.type==='干潮'?'#228be6':'#f76707'}"/><text x="${x(p).toFixed(1)}" y="${(y(p)-13).toFixed(1)}" text-anchor="middle" font-size="15" fill="#334155">${p.type}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+27).toFixed(1)}" text-anchor="middle" font-size="14" fill="#334155">${p.time}</text><text x="${x(p).toFixed(1)}" y="${(y(p)+45).toFixed(1)}" text-anchor="middle" font-size="13" fill="#64748b">${p.level}cm</text>`).join(''); return `<svg class="tide-svg" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" rx="20" fill="#f8fbff"/><line x1="${pl}" y1="${h-pb}" x2="${w-pr}" y2="${h-pb}" stroke="#cbd5e1"/><path d="${d} L${w-pr},${h-pb} L${pl},${h-pb} Z" fill="rgba(34,139,230,.10)"/><path d="${d}" fill="none" stroke="#1c7ed6" stroke-width="5" stroke-linecap="round"/>${marks}</svg>`}
function slitChart(last){const line=66; const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)); const pos=n=>{const raw=last[n]?.st_raw||''; const v=Number(last[n]?.st); if(!Number.isFinite(v))return 45; if(raw.startsWith('F'))return clamp(line+Math.abs(v)*150, line+4, 82); return clamp(line-v*185, 28, line-2)}; const order=[1,2,3,4,5,6].sort((a,b)=>num(last[a]?.start_course,a)-num(last[b]?.start_course,b)); const changed=order.some((n,i)=>n!==i+1); return `<h3>スリット体型 ${changed?'<span class="note">進入変更あり</span>':''}</h3><div class="slit">${order.map((n,i)=>`<div class="slit-row" style="top:${22+i*34}px"><div class="slit-lane">${lane(n)}<small>${last[n]?.start_course?last[n].start_course+'コース':''}</small></div><div class="boatmark" style="left:calc(${pos(n)}% - 17px);background:${boatColor(n)};color:${n==5?'#111':'#fff'}">${n}</div><div class="slit-st ${(last[n]?.st_raw||'').startsWith('F')?'f':''}">${last[n]?.st_raw??'-'}</div></div>`).join('')}</div>`}
function renderTabs(){raceTabs.innerHTML=D.races.map(r=>`<button class="${r.race===raceNo?'active':''}" onclick="raceNo=${r.race};renderAll();window.scrollTo({top:0,behavior:'smooth'})">${r.race}R</button>`).join('')}
function modeDesc(){return mode==='ai'?'本線5点・抑え3点・穴2点。的中率と回収率のバランスを見たAI予想。':'攻め役1着・スリット攻め・展開連動・高配当を重視したAI荒れ予想。'}
function entryChangeNote(p){const changes=p.entryChanges||race().entry_changes||[];return changes.length?`<div class="attack" style="border-color:#f59f00;background:#fff7ed">進入変更反映：${changes.map(x=>`${x.lane}号艇→${x.course}コース`).join(' / ')}<br><span class="note">スリット情報の実進入でコース適性・攻め役・1号艇評価を再計算済み</span></div>`:''}
function gradeClass(c){return String(c||'').startsWith('A')?'grade a':'grade'}
function fBadge(b){const f=String(b.f||''); return /^F[1-9]/.test(f)?`<span class="f-badge">${f}</span>`:''}
function seasonRunCard(run){if(!run||!run.race)return `<div class="season-run-card empty"><div class="meta">-</div><div class="finish">-</div></div>`; const f=String(run.finish||'-'); const cls=/^[12]/.test(f)?'good':/^[34]/.test(f)?'mid':/^[56]/.test(f)?'bad':/[転妨失欠ＦF]/.test(f)?'trouble':''; return `<div class="season-run-card ${cls}"><div class="meta"><b>${run.race}</b> / ${run.frame||'-'}枠<br>ST ${run.st||'-'}</div><div class="finish">${f}</div></div>`}
function seasonTableFromGroups(groups,text){let gs=Array.isArray(groups)?groups:[]; if(!gs.length){const runs=String(text||'').split('/').map(x=>x.trim()).filter(Boolean).map(x=>{const m=x.match(/([0-9]+R) +([1-6]) +(F?[.][0-9]{2}) +(.+)/);return m?{race:m[1],frame:m[2],st:m[3],finish:m[4]}:null}).filter(Boolean); for(let i=0;i<runs.length;i+=2){gs.push({day:`${Math.floor(i/2)+1}日目`,runs:runs.slice(i,i+2)})}} if(!gs.length)return '<div class="note">-</div>'; return `<div class="season-board">${gs.map(g=>`<div class="season-day-row"><div class="season-day-head">${g.day}</div>${seasonRunCard((g.runs||[])[0])}${seasonRunCard((g.runs||[])[1])}</div>`).join('')}</div>`}
function stNumber(v){const s=String(v??'').trim(); if(!s||s==='-')return 9; const n=Number(s.startsWith('.')?'0'+s:s); return Number.isFinite(n)?n:9}
function gradeScore(b){const base={A1:80,A2:65,B1:45,B2:30}[b.class]??40; return base + num(b.nat_win)*4}
function kimariteInfo(b){const starts=b.kimarite_starts||b.course_starts||''; if(Number(b.lane)===1){const v=num(b.escape_rate,-1); return {score:v, main:v>=0?`逃げ ${v.toFixed(1)}%`:'逃げ -', sub:`${starts||'-'}走 / 勝${b.kimarite_wins||'-'}`}} const s=num(b.sashi_rate,-1), m=num(b.makuri_rate,-1), ms=num(b.makuri_sashi_rate,-1); const score=Math.max(s,m,ms); return {score, main:`差 ${s>=0?s.toFixed(1):'-'}% / ま ${m>=0?m.toFixed(1):'-'}%`, sub:`ま差 ${ms>=0?ms.toFixed(1):'-'}% / ${starts||'-'}走`}}
function motorScore(b){return rateNum(b.motor_2)*0.45 + rateNum(b.motor_3)*0.55}
function localScore(b){return num(b.local_win)*10}
function localStScore(b){const st=stNumber(b.local_avg_st); return st>=9?0:Math.max(0, 100 - st*420)}
function courseScore(b){return num(b.course_top3_rate)*0.70 + num(b.course_top3_diff)*0.90 + (String(b.course_reliability||'')==='A'?10:String(b.course_reliability||'')==='B'?6:0)}
function seasonScore(b){const runs=(b.season_groups||[]).flatMap(g=>g.runs||[]); if(!runs.length)return 0; let score=45, stSum=0, stCnt=0; for(const run of runs){const f=String(run.finish||''); const m=f.match(/[1-6]/); if(m){const fin=Number(m[0]); score += fin===1?22:fin===2?14:fin===3?8:fin>=5?-10:-2}else if(/[転妨失欠ＦF]/.test(f)){score-=18} const raw=String(run.st||''); if(/F?[.][0-9]{2}/.test(raw)){let v=stNumber(raw.replace('F','')); if(raw.startsWith('F'))score-=14; stSum+=v; stCnt++}} if(stCnt){const avg=stSum/stCnt; score += avg<=0.12?14:avg<=0.15?7:avg>=0.22?-10:avg>=0.19?-5:0} return score}
function seasonCompareInfo(b){const runs=(b.season_groups||[]).flatMap(g=>g.runs||[]); if(!runs.length)return {score:0,main:'-',sub:'節間なし'}; let stSum=0,stCnt=0,top3=0; const chips=runs.slice(-4).map(run=>{const f=String(run.finish||'-'); const cls=/^[12]/.test(f)?'good':/^[34]/.test(f)?'mid':/^[56]/.test(f)?'bad':/[転妨失欠ＦF]/.test(f)?'trouble':''; const raw=String(run.st||''); if(/F?[.][0-9]{2}/.test(raw)){stSum+=stNumber(raw.replace('F',''));stCnt++} if(/^[123]/.test(f))top3++; return `<span class="cs-fin ${cls}" title="${run.race||''} ${run.frame||''}枠 ST${run.st||'-'}">${f}</span>`}).join(''); const avg=stCnt?'.'+String(Math.round(stSum/stCnt*100)).padStart(2,'0'):'-'; return {score:seasonScore(b),main:`<span class="compare-season">${chips}</span>`,sub:`3内 ${top3}/${runs.length}・平均ST ${avg}`}}
function compareMark(score){return score>=82?'◎':score>=66?'○':score>=48?'△':'-'}
function compareRank(rows,key,lane){const arr=rows.map(x=>[x.lane,x[key].score]).filter(x=>Number.isFinite(x[1])).sort((a,b)=>b[1]-a[1]); const r=arr.findIndex(x=>x[0]===lane)+1; return r===1?'rank1':r===2?'rank2':''}
function compareCell(rows,row,key){const c=row[key],cls=compareRank(rows,key,row.lane); return `<td><div class="compare-cell ${cls}"><span class="compare-main">${c.main}</span><span class="compare-sub">${c.sub}</span></div></td>`}
function renderCompare(){const r=race(); const rows=r.racers.map(b=>{const ki=kimariteInfo(b), si=seasonCompareInfo(b); return {lane:b.lane,name:b.name,grade:{score:gradeScore(b),main:`${compareMark(gradeScore(b))} ${b.class}`,sub:`全国 ${b.nat_win}`},kimarite:{score:ki.score,main:ki.main,sub:ki.sub},motor:{score:motorScore(b),main:`${compareMark(motorScore(b))} No.${b.motor_no}`,sub:`2連 ${b.motor_2} / 3連 ${b.motor_3}`},local:{score:localScore(b),main:`${compareMark(localScore(b))} ${b.local_win}`,sub:`当地勝率`},localSt:{score:localStScore(b),main:`${compareMark(localStScore(b))} ${b.local_avg_st||'-'}`,sub:`当地平均ST / ${b.local_st_order||'-'}`},course:{score:courseScore(b),main:`${compareMark(courseScore(b))} ${courseLabel(b)}`,sub:`3連 ${b.course_top3_rate||'-'}% / 差 ${b.course_top3_diff||'-'}pt`},season:si}}); compare.innerHTML=`<div class="card"><h2>${r.race}R 選手比較</h2><div class="note">各項目を簡易スコア化。列ごとに1位は薄い赤、2位は薄い黄色で表示しています。決まり手はこの選手の該当コース実績から算出しています。</div><div class="compare-wrap"><table class="compare-table"><tr><th>名前</th><th>格</th><th>決まり手</th><th>モーター</th><th>当地</th><th>当地スタート</th><th>コース適性</th><th>節間成績</th></tr>${rows.map(row=>`<tr><td>${lane(row.lane)} <b>${row.name}</b></td>${compareCell(rows,row,'grade')}${compareCell(rows,row,'kimarite')}${compareCell(rows,row,'motor')}${compareCell(rows,row,'local')}${compareCell(rows,row,'localSt')}${compareCell(rows,row,'course')}${compareCell(rows,row,'season')}</tr>`).join('')}</table></div></div>`}
function renderEntry(){const r=race();entry.innerHTML=`<div class="card"><h2>${r.race}R 締切 ${r.deadline||'-'} <span class="note">${r.type||''}</span></h2>${r.racers.map(b=>`<div class="boat">${lane(b.lane)}<div><div class="name">${b.name}${b.female?' 💗':''}<span class="${gradeClass(b.class)}">${b.class}</span>${fBadge(b)}</div><div class="sub">${b.age}歳 / ${b.weight}kg　${b.branch}支部 / ${b.home}出身</div><div class="stats"><div class="stat"><span>全国</span><b>${b.nat_win}</b></div><div class="stat"><span>当地</span><b>${b.local_win}</b></div><div class="stat"><span>全国平均ST</span><b>${b.avg_st}</b></div></div><div class="stats"><div class="stat"><span>当地平均ST</span><b>${b.local_avg_st||'-'}</b><em>${b.local_avg_st_source||''}</em></div><div class="stat"><span>当地ST順位</span><b>${b.local_st_order||'-'}</b></div><div class="stat"><span>自前DB件数</span><b>${b.local_st_count||'-'}</b><em>信頼 ${b.local_st_rank||'-'}</em></div></div><div class="note">当地平均ST・順位は取得済みの当地データを優先。件数と信頼度は自前DBの同コース実績です。</div>${courseSummary(b)}<div class="stats"><div class="stat"><span>モーター</span><b>${b.motor_no}</b></div>${statBox('2連率',b.motor_2,raceRankClass('motor_2',b.lane))}${statBox('3連率',b.motor_3,raceRankClass('motor_3',b.lane))}</div><div class="season">節間成績 ${b.hayami?`<span class="note"> / 早見 ${b.hayami}</span>`:''}${seasonTableFromGroups(b.season_groups,b.season_results)}</div></div></div>`).join('')}</div>`}
function renderTide(){const p=pred(),z=p.tideZone||{},events=D.tide.events||[];tide.innerHTML=`<div class="card"><h2>東京湾 潮見表</h2><div class="tide-type">${D.tide.tideType||'-'}</div><div class="note">${D.tide.date||''} / ${D.tide.source||''}<br>${D.note||''}</div><div class="attack">このレースの潮判定：${z.nearest||'-'} / ${z.zone||'-'} / ${z.band||'-'} / ${z.phase||'-'}</div>${tideSvg(events)}<table><tr><th>種別</th><th>時刻</th><th>潮位</th></tr>${events.map(x=>`<tr><td>${x.type}</td><td>${x.time}</td><td>${x.level}cm</td></tr>`).join('')}</table></div>`}
function renderRealtime(){const p=pred(),rt=p.realtime||{},last=rt.last||{},ex=rt.original||{},w=rt.weather||{},wd=w.windDirection||w.windDir||w.wind_dir||'-';realtime.innerHTML=`<div class="card"><h2>直前情報</h2><div class="note">天候 ${w.weather||'-'} / 風向 ${wd} / 風速 ${w.wind||'-'}m / 波 ${w.wave||'-'}cm / 水温 ${w.water||'-'}℃</div><table><tr><th>枠</th><th>展示</th><th>ST</th><th>チルト</th><th>部品</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${rankValue(last,n,'time',last[n]?.time,true)}</td><td>${last[n]?.st_raw??last[n]?.st??'-'}</td><td>${last[n]?.tilt??'-'}</td><td>${last[n]?.part??'-'}</td></tr>`).join('')}</table>${slitChart(last)}<h3>オリジナル展示</h3><table><tr><th>枠</th><th>1周</th><th>回り足</th><th>直線</th><th>展示</th><th>合算</th><th>平均との差</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${rankValue(ex,n,'lap',ex[n]?.lap,true)}</td><td>${rankValue(ex,n,'turn',ex[n]?.turn,true)}</td><td>${rankValue(ex,n,'line',ex[n]?.line,true)}</td><td>${rankValue(ex,n,'show',ex[n]?.show,true)}</td><td>${rankValue(ex,n,'sum',ex[n]?.sum,true)}</td><td>${ex[n]?.sum_diff??'-'}</td></tr>`).join('')}</table></div>`}
function renderPred(){const p=pred(); if(!p.win){prediction.innerHTML='<div class="card"><h2>予想</h2><div class="note">このレースの予想データはまだありません。</div></div>';return} const r=p.readability||{},s=p.predictionStage||{label:'AI仮予想',statusText:'直前情報未反映',badge:'仮予想',color:'yellow'};prediction.innerHTML=`<div class="card index"><div class="stage ${s.color||'yellow'}"><div><b>${s.label}</b><br>${s.statusText}</div><span>${s.badge}</span></div>${entryChangeNote(p)}<h2>戸田ロジック予想</h2><div class="probgrid"><div class="probcard"><span>SAB</span><b>${p.sab}</b></div><div class="probcard"><span>荒れ指数</span><b>${p.upsetIndex}%</b></div><div class="probcard"><span>攻め役</span><b>${p.attack?.attackLane??'-'}号艇</b></div></div><div class="note">荒れ指数は「1が飛ぶか」だけではなく、軸・展開・ロジックのはまり具合から算出。</div><div class="probgrid" style="margin-top:8px"><div class="probcard"><span>軸明確度</span><b>${r.axisClarity??'-'}%</b></div><div class="probcard"><span>ロジックはまり</span><b>${r.logicFit??'-'}%</b></div><div class="probcard"><span>混戦度</span><b>${r.chaos??'-'}%</b></div></div><div class="note">軸候補：${r.axisLane?r.axisLane+'号艇':'-'} / ${r.comment||''}<br>潮：${p.tideZone?.nearest||'-'} / ${p.tideZone?.zone||'-'}</div></div><div class="card"><h2>全艇確率</h2><table><tr><th>枠</th><th>1着</th><th>2着</th><th>3着</th></tr>${[1,2,3,4,5,6].map(n=>`<tr><td>${lane(n)}</td><td>${num(p.win[n]).toFixed(1)}%</td><td>${num(p.second[n]).toFixed(1)}%</td><td>${num(p.third[n]).toFixed(1)}%</td></tr>`).join('')}</table></div><div class="card"><h2>買い目</h2><div class="mode"><button class="${mode==='ai'?'active':''}" onclick="mode='ai';renderPred()">AI予想</button><button class="${mode==='aiUpset'?'active':''}" onclick="mode='aiUpset';renderPred()">AI荒れ予想</button></div><div class="note">${modeDesc()}</div>${(p[mode]||[]).map(t=>`<div class="ticket"><div><div class="combo">${t.combo}</div><span class="role">${t.role||''}</span></div><div><span class="note">確率</span><br><b>${num(t.prob).toFixed(2)}%</b></div><div><span class="note">オッズ</span><br><b>${t.odds??'-'}倍</b></div></div>`).join('')}</div>`}
function renderLogs(){const p=pred(),list=p.logs||[];logs.innerHTML=`<div class="card"><h2>補正ログ</h2><div class="note">戸田指示書とマスタDBをどこで反映したかを表示します。</div>${list.map(l=>`<div class="log"><div class="log-title">${l.stage} ${l.lane?lane(l.lane):''} <span class="note">1着${l.win} / 2着${l.second} / 3着${l.third}</span></div><div class="log-body">${l.reason}<br>${l.source?`参照: ${l.source}`:''}</div></div>`).join('')}</div>`}
function renderResult(){const p=pred(),r=p.result||{status:'waiting',message:'結果未取得'}; const hitAi=(r.hitAi||[]).length,hitUpset=(r.hitUpset||[]).length,order=String(r.order||'').split('-').filter(Boolean); result.innerHTML=`<div class="card result-main"><h2>レース結果</h2><div class="stage ${r.status==='ok'?'green':'yellow'}"><div><b>${r.status==='ok'?'結果取得済み':'結果待ち'}</b><br>${r.message||''}</div><span>${r.status==='ok'?'確定':'待機'}</span></div>${r.order?`<div class="result-line"><div class="result-label">3連単 着順</div><div class="finish-row">${order.map((n,i)=>`${i?'<span class="finish-arrow" aria-hidden="true"></span>':''}${finishBoat(n)}`).join('')}</div></div><div class="result-pay"><div class="paybox"><span>払戻</span><b>${r.payout3t||'-'}</b></div><div class="paybox"><span>人気</span><b>${r.popularity3t||'-'}</b></div></div>`:`<div class="result-line"><div class="result-label">結果待ち</div><div class="note">締切9分後から結果取得を試します。</div></div>`}<div class="result-sub"><div class="paybox"><span>決まり手</span><b>${r.kimarite||'-'}</b></div><div class="paybox"><span>AI予想</span><b>${hitAi?'的中':'-'}</b></div><div class="paybox"><span>AI荒れ</span><b>${hitUpset?'的中':'-'}</b></div></div>${r.order?`<div class="note result-hit">結果ソース：${r.source||'-'}<br>AI予想該当：${hitAi? r.hitAi.map(x=>`${x.combo} ${x.role||''}`).join(' / '):'なし'}<br>AI荒れ予想該当：${hitUpset? r.hitUpset.map(x=>`${x.combo} ${x.role||''}`).join(' / '):'なし'}</div>`:''}</div>`}
function renderOdds(){const p=pred(),items=Object.entries(p.odds||{}).slice(0,120);odds.innerHTML=`<div class="card"><h2>3連単オッズ</h2><div class="oddsboard">${items.map(([k,v])=>`<div class="odrow"><b>${k}</b><span>${k.split('-').map(x=>lane(+x)).join('')}</span><strong>${v}</strong></div>`).join('')}</div></div>`}
function renderAll(){renderTabs();renderEntry();renderCompare();renderTide();renderRealtime();renderPred();renderLogs();renderResult();renderOdds()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));$(b.dataset.pane).classList.add('active')});
renderAll();
</script>
</body>
</html>
